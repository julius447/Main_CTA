<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Main CTA — Version A · Ring direkt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VERSION A (rev 2) — 1:1 med baslinjens geometri, med de 20 %:
   Edvin-bilden i SAMMA placering som originalet (80 % bredd,
   flex-end, bröstbild), EN ring-CTA, båda vågorna tillbaka,
   rubrik bruten så endast "sekunder!" ligger på rad 2 (desktop),
   nya g-row-badgen finjusterad, mobil: centrerad rubrik + paragraf.
   Ampy-tokens verbatim.
   ============================================================ */
:root{
  --teal:hsl(171 100% 33%);
  --teal-bright:hsl(171 95% 41%);
  --blue:hsl(189 43% 56%);
  --midnight:hsl(237 69% 12%);
  --ink:#363636;
  --section-bg:#f5f9ff;
  --radius-l:clamp(16px, 1.4vw, 20px);
  --radius-m:16px;
}
*,:after,:before{box-sizing:border-box}
html{font-size:62.5%}
body{
  margin:0;font-family:'Outfit',system-ui,sans-serif;font-weight:300;
  color:var(--ink);background:#fff;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

.mcta{background:var(--section-bg);padding:clamp(28px,4vw,56px) clamp(16px,3vw,40px);display:flex;justify-content:center}
.mcta__card{
  position:relative;overflow:hidden;
  width:min(1280px,100%);
  background:#fff;border-radius:var(--radius-l);
  box-shadow:0 0 16px rgba(190,190,190,.4);
  display:grid;grid-template-columns:1fr 400px;gap:clamp(24px,3vw,48px);
  padding:clamp(28px,3.2vw,48px) clamp(28px,4.5vw,72px);
  align-items:center;
}
/* bg-vågen (Vector-3) — bakom allt, förankrad nere-höger som i originalet */
.mcta__bgwave{
  position:absolute;right:clamp(28px,4.5vw,72px);bottom:clamp(28px,3.2vw,48px);
  width:44%;height:auto;z-index:0;pointer-events:none;
}
.mcta__text{position:relative;z-index:1;min-width:0;display:flex;flex-direction:column;align-items:flex-start;gap:16px}

.mcta__h{
  margin:0;font-size:clamp(2.8rem,1.25vw + 2.4rem,4rem);font-weight:500;line-height:1.1;
  color:var(--midnight);letter-spacing:-.01em;
}
.mcta__h .grad{
  color:var(--teal-bright); /* fallback om text-clip ej stöds */
  background:linear-gradient(90deg,var(--teal-bright) 15%,var(--blue) 85%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  -webkit-box-decoration-break:clone;box-decoration-break:clone; /* jämn gradient över radbrytning (Safari-söm) */
  font-weight:inherit;
}
/* resiliens: gradient-text får aldrig försvinna om bakgrundsgrafik nollas */
@supports not ((-webkit-background-clip:text) or (background-clip:text)){
  .mcta__h .grad{-webkit-text-fill-color:currentColor;background:none;color:var(--teal-bright)}
}
@media (forced-colors:active){
  .mcta__h .grad{-webkit-text-fill-color:currentColor;background:none;color:CanvasText}
}
@media print{
  .mcta__h .grad{-webkit-text-fill-color:currentColor;background:none;color:#090b32}
}
/* forcerad brytning ("...inom 60" / "sekunder!") ENDAST på bred desktop där
   vänsterkolumnen rymmer rad 1 — under 1300px sköter naturlig brytning det
   utan orphan (verifierat: 1120px ger rent 2-radigt "...inom" / "60 sekunder!") */
.br-d{display:none}
@media (min-width:1300px){.br-d{display:inline}}
.mcta__p{
  margin:0;font-size:clamp(1.6rem,.21vw + 1.53rem,1.8rem);line-height:1.6;
  max-width:52ch;text-align:left;
}

/* ============ CTA-PARET ============
   Ring (blå, primär) + Kostnadsfri rådgivning (grön, kanoniska
   cta-primary-gradienten). Enhetligt skelett: samma höjd, radius,
   typografi (mjukad 500, mjuk navy) och skugg-språk — text vänster /
   ikon höger på mobil (som live-blocket), chip-vänster på desktop. */
.mcta__cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px}
.btn-ring,.btn-radgivning{
  display:inline-flex;align-items:center;
  min-height:58px;border-radius:var(--radius-m);
  font-size:1.6rem;font-weight:500;line-height:1;white-space:nowrap;
  color:hsl(237 35% 24%);
  transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
.btn-ring{
  gap:14px;padding:11px 30px 11px 12px;
  background:linear-gradient(120deg,#b6f2ff 0%,#5eb1bf 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    0 2px 4px rgba(9,11,50,.06),
    0 10px 26px -6px rgba(94,177,191,.55);
}
.btn-ring:hover{
  transform:translateY(-1.5px);
  filter:saturate(1.08) brightness(1.02);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    0 3px 6px rgba(9,11,50,.07),
    0 16px 34px -8px rgba(94,177,191,.65);
}
.btn-ring:active{transform:translateY(0);filter:saturate(1.05)}
.btn-ring:focus-visible{outline:3px solid var(--blue);outline-offset:3px}
.btn-ring__chip{
  position:relative;flex:0 0 auto;
  width:36px;height:36px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.92);color:hsl(237 35% 24%);
  box-shadow:0 1px 3px rgba(9,11,50,.14);
}
.btn-ring__chip::after{
  content:"";position:absolute;inset:0;border-radius:50%;
  box-shadow:0 0 0 0 rgba(255,255,255,.65);
  animation:mctaRing 2.8s cubic-bezier(.4,0,.4,1) infinite;
}
@keyframes mctaRing{
  0%{box-shadow:0 0 0 0 rgba(255,255,255,.65)}
  55%{box-shadow:0 0 0 9px rgba(255,255,255,0)}
  100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
}
.btn-radgivning{
  gap:16px;padding:11px 24px;
  background:linear-gradient(120deg,#55ff9a 0%,#5eb1bf 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.45),
    0 2px 4px rgba(9,11,50,.06),
    0 10px 26px -6px rgba(94,199,160,.45);
}
.btn-radgivning:hover{
  transform:translateY(-1.5px);
  filter:saturate(1.06) brightness(1.02);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.5),
    0 3px 6px rgba(9,11,50,.07),
    0 16px 34px -8px rgba(94,199,160,.55);
}
.btn-radgivning:active{transform:translateY(0)}
.btn-radgivning:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
.btn-radgivning .pil{transition:transform .16s ease}
.btn-radgivning:hover .pil{transform:scale(1.18)}
@media (prefers-reduced-motion:reduce){
  .btn-ring__chip::after{animation:none}
  .btn-ring,.btn-ring:hover,.btn-radgivning,.btn-radgivning:hover{transition:none;transform:none}
  .btn-radgivning .pil,.btn-radgivning:hover .pil{transition:none;transform:none}
}
.btn-ring svg,.btn-radgivning svg{flex:0 0 auto}
/* optisk mikro-nudge: luren en gnutta ner-vänster i chipen */
.btn-ring__chip svg{transform:translate(-1px,1px)}

/* proof-raden — g-row-mönstret, optiskt linjerad:
   allt flex-centrerat på en 17px-axel, enhetlig 10px-rytm,
   stjärnraden knuten till labelns versalhöjd */
.g-row{
  display:inline-flex;align-items:center;flex-wrap:wrap;gap:10px;
  min-height:44px;padding:6px 0;
  font-size:1.5rem;font-weight:400;color:var(--midnight);line-height:1;
}
.g-row:focus-visible{outline:3px solid var(--teal);outline-offset:3px;border-radius:6px}
.g-row .g-icon{display:block;flex:0 0 auto}
.g-row .g-label{display:block;white-space:nowrap}
.g-row strong{font-weight:700}
.g-row:hover .g-label{text-decoration:underline;text-underline-offset:3px}
.g-row .stars{display:inline-flex;gap:3px}
.g-row .stars svg{width:14px;height:14px;fill:var(--teal);display:block}

/* bildblocket — baslinjens geometri: kolumn 400px, bilden 80 % bredd,
   flex-end, samma boxproportion som originalbilden (320×366), radius,
   overlay-vågen nere-höger över bildens nedre hörn */
.mcta__media{
  margin:0;position:relative;z-index:1;align-self:stretch;
  display:flex;align-items:flex-end;justify-content:flex-end;
  border-radius:var(--radius-l);overflow:hidden;
  min-height:366px;
}
/* croppen: fönstret täcker huvudtopp (~16 %) med luft ovanför NER TILL
   ampy-loggan på tröjan (~86 %) — samma framing på alla enheter */
.mcta__media .photo{
  width:80%;height:auto;aspect-ratio:320/385;object-fit:cover;object-position:50% 46%;
  border-radius:var(--radius-l);
}
.mcta__wave{
  position:absolute;right:0;bottom:-1px;width:50%;height:auto;z-index:2;pointer-events:none;
}

@media (max-width:1024px){
  .mcta__card{grid-template-columns:1fr 340px;padding:32px 36px}
  .mcta__bgwave{right:36px;bottom:32px}
  .mcta__media{min-height:0}
}
@media (max-width:767px){
  .mcta__card{grid-template-columns:1fr;gap:20px;padding:20px 20px 28px}
  .mcta__bgwave{display:none}
  .mcta__media{order:-1;align-self:auto;justify-content:center;min-height:0}
  .mcta__media .photo{width:100%;aspect-ratio:320/385;object-position:50% 46%}
  .mcta__wave{width:60%}
  .mcta__text{align-items:center}
  .mcta__h{text-align:center;font-size:clamp(2.4rem,5.5vw,3rem);line-height:1.16}
  .mcta__p{text-align:center}
  .mcta__cta{width:100%;flex-direction:column;gap:12px}
  /* mobil: text vänster / ikon höger (live-blockets grammatik) */
  .btn-ring{width:100%;flex-direction:row-reverse;justify-content:space-between;padding:11px 12px 11px 22px}
  .btn-radgivning{width:100%;justify-content:space-between;padding:11px 22px}
  .g-row{align-self:center}
}
@media (max-width:360px){
  .mcta__h{font-size:2.2rem}
}
</style>
</head>
<body>

          </span>
          Ring 010-265 79 79
        </a>
        <a class="btn-radgivning" href="https://ampy.se/kontakt/">

    <figure class="mcta__media">

  </div>
</section>
